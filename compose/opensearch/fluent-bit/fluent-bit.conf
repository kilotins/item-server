[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# Example: tail a log file
# [INPUT]
#     Name         tail
#     Path         /var/log/enonic/*.log
#     Parser       enonic
#     Tag          enonic.*
#     Refresh_Interval 10

# Placeholder: CPU metrics for demo
[INPUT]
    Name         cpu
    Tag          cpu.local
    Interval_Sec 30

[INPUT]
    Name         mem
    Tag          mem.local
    Interval_Sec 30

[OUTPUT]
    Name         opensearch
    Match        *
    Host         opensearch
    Port         9200
    HTTP_User    admin
    HTTP_Passwd  ${OPENSEARCH_ADMIN_PASSWORD}
    Index        demo-metrics
    tls          On
    tls.verify   Off
    Suppress_Type_Name On
